<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <title>깜짝 선물 페이지</title>

<body style="text-align:center; font-family:sans-serif; margin:0;">

  <!-- 🔥 배너 이미지 -->

    <button onclick="sendGift()"

      카카오톡으로 보내기

  <script>
    Kakao.init('35ebefb59de3ba4d37ac5a2465514fe4');

    function sendGift() {
      Kakao.Share.sendCustom({
        templateId: 131503
      });
    }
